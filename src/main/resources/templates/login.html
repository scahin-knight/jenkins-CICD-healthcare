<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HealthWatch AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .login-side { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); border-radius: 15px 0 0 15px; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card login-card flex-row">
                    <div class="col-5 d-none d-md-flex login-side">
                        <i class="bi bi-heart-pulse-fill display-1 mb-3 text-white"></i>
                        <h2 class="fw-bold">HealthWatch<span class="text-info">AI</span></h2>
                        <p class="mt-3 opacity-75">Enterprise-Grade Real-Time Patient Health Monitoring System</p>
                    </div>
                    <div class="col-12 col-md-7 p-5">
                        <h3 class="mb-4 fw-bold text-dark">Sign In</h3>
                        
                        <div th:if="${param.error}" class="alert alert-danger shadow-sm">
                            Invalid username or password.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success shadow-sm">
                            You have been logged out.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted">Username</label>
                                <input type="text" class="form-control form-control-lg bg-light border-0" id="username" name="username" required autofocus placeholder="admin">
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted">Password</label>
                                <input type="password" class="form-control form-control-lg bg-light border-0" id="password" name="password" required placeholder="password">
                            </div>
                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                <label class="form-check-label text-muted" for="remember-me">Remember me</label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
