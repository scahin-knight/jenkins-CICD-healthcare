<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Error')}"></head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 5rem;"></i>
        <h1 class="display-4 fw-bold mt-3">Oops!</h1>
        <p class="lead text-muted">Something went wrong.</p>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <a href="/" class="btn btn-primary mt-4"><i class="bi bi-house-door"></i> Back to Dashboard</a>
    </div>
</body>
</html>
