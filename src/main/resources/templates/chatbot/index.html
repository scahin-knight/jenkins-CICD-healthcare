<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('AI Assistant')}"></head>
<body>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            
            <div class="content-wrapper">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0 text-gray-800">AI Medical Assistant</h2>
                </div>

                <div class="card shadow-sm h-75">
                    <div class="card-body d-flex flex-column p-0">
                        <!-- Chat Box -->
                        <div id="chat-box" class="flex-grow-1 p-4" style="overflow-y: auto; background-color: #f8f9fc;">
                            <!-- Bot Message -->
                            <div class="d-flex mb-4">
                                <div class="bg-primary rounded-circle text-white d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                                    <i class="bi bi-robot"></i>
                                </div>
                                <div class="bg-white p-3 rounded shadow-sm" style="max-width: 75%;">
                                    Hello! I'm HealthWatch AI. I can help explain medical reports, clarify abnormal vitals, and answer general health questions. How can I assist you today?
                                </div>
                            </div>
                        </div>

                        <!-- Input Area -->
                        <div class="p-3 bg-white border-top">
                            <form id="chat-form" class="d-flex align-items-center">
                                <input type="text" id="chat-input" class="form-control me-2" placeholder="Ask about reports, vitals, or medical terms..." autocomplete="off" required>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-send-fill"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('chat-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputField = document.getElementById('chat-input');
            const question = inputField.value.trim();
            if (!question) return;

            const chatBox = document.getElementById('chat-box');
            
            // Append User Message
            const userMsgHtml = `
                <div class="d-flex flex-row-reverse mb-4">
                    <div class="bg-secondary rounded-circle text-white d-flex align-items-center justify-content-center ms-3" style="width: 40px; height: 40px;">
                        <i class="bi bi-person"></i>
                    </div>
                    <div class="bg-primary text-white p-3 rounded shadow-sm" style="max-width: 75%;">
                        ${question}
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', userMsgHtml);
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Fetch AI Response
            fetch('/api/chatbot/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            })
            .then(response => response.json())
            .then(data => {
                const botMsgHtml = `
                    <div class="d-flex mb-4">
                        <div class="bg-primary rounded-circle text-white d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                            <i class="bi bi-robot"></i>
                        </div>
                        <div class="bg-white p-3 rounded shadow-sm" style="max-width: 75%;">
                            ${data.answer}
                        </div>
                    </div>
                `;
                chatBox.insertAdjacentHTML('beforeend', botMsgHtml);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        });
    </script>
</body>
</html>
