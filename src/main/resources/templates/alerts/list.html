<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Alerts')}"></head>
<body>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            
            <div class="content-wrapper">
                <h2 class="h3 mb-4 text-gray-800">Active Alerts</h2>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Time</th>
                                        <th>Severity</th>
                                        <th>Patient</th>
                                        <th>Vital</th>
                                        <th>Reading</th>
                                        <th>Message</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="alert : ${alerts}" th:classappend="${alert.severity.name() == 'CRITICAL' ? 'table-danger' : 'table-warning'}">
                                        <td th:text="${#temporals.format(alert.timestamp, 'HH:mm:ss')}"></td>
                                        <td>
                                            <span class="badge" th:classappend="${alert.severity.name() == 'CRITICAL' ? 'bg-danger' : 'bg-warning'}" th:text="${alert.severity}"></span>
                                        </td>
                                        <td>
                                            <a th:href="@{/patients/{id}(id=${alert.patient.id})}" class="fw-bold text-dark text-decoration-none" th:text="${alert.patient.fullName}"></a>
                                        </td>
                                        <td th:text="${alert.vital}"></td>
                                        <td class="fw-bold" th:text="${alert.reading}"></td>
                                        <td th:text="${alert.message}"></td>
                                        <td>
                                            <form th:action="@{/alerts/{id}/acknowledge(id=${alert.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-outline-dark">
                                                    <i class="bi bi-check2-all"></i> Ack
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(alerts)}">
                                        <td colspan="7" class="text-center text-muted py-5">
                                            <i class="bi bi-shield-check fs-1 d-block mb-3 text-success"></i>
                                            <p class="fs-5">No active alerts. All systems normal.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
