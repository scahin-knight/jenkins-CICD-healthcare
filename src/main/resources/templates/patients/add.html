<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Add Patient')}"></head>
<body>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            
            <div class="content-wrapper">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0 text-gray-800">Add New Patient</h2>
                    <a href="/" class="btn btn-secondary shadow-sm">
                        <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
                    </a>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body p-4">
                        <form th:action="@{/patients}" th:object="${patient}" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Patient Code</label>
                                    <input type="text" class="form-control" th:field="*{patientCode}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" th:field="*{fullName}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Age</label>
                                    <input type="number" class="form-control" th:field="*{age}" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Gender</label>
                                    <select class="form-select" th:field="*{gender}" required>
                                        <option value="">Select...</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Blood Group</label>
                                    <select class="form-select" th:field="*{bloodGroup}">
                                        <option value="">Select...</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone Number</label>
                                    <input type="text" class="form-control" th:field="*{phoneNumber}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Emergency Contact</label>
                                    <input type="text" class="form-control" th:field="*{emergencyContact}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Room Number</label>
                                    <input type="text" class="form-control" th:field="*{roomNumber}">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Medical History</label>
                                    <textarea class="form-control" th:field="*{medicalHistory}" rows="3"></textarea>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Allergies</label>
                                    <textarea class="form-control" th:field="*{allergies}" rows="2"></textarea>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary">Save Patient</button>
                                <a href="/" class="btn btn-light ms-2">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
