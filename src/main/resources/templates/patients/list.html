<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Patients')}"></head>
<body>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            
            <div class="content-wrapper">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0 text-gray-800">Patients</h2>
                    <a href="/patients/new" class="btn btn-primary shadow-sm">
                        <i class="bi bi-plus-lg me-1"></i> Add Patient
                    </a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Patient Code</th>
                                        <th>Name</th>
                                        <th>Age/Gender</th>
                                        <th>Room</th>
                                        <th>Status</th>
                                        <th>Admitted</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="patient : ${patients}">
                                        <td th:text="${patient.patientCode}"></td>
                                        <td class="fw-bold" th:text="${patient.fullName}"></td>
                                        <td th:text="${patient.age} + ' / ' + ${patient.gender}"></td>
                                        <td th:text="${patient.roomNumber}"></td>
                                        <td>
                                            <span class="badge" th:classappend="${patient.admissionStatus == 'Critical' ? 'bg-danger' : (patient.admissionStatus == 'Warning' ? 'bg-warning' : 'bg-success')}" th:text="${patient.admissionStatus}"></span>
                                        </td>
                                        <td th:text="${#temporals.format(patient.admissionDate, 'MMM dd, yyyy')}"></td>
                                        <td>
                                            <a th:href="@{/patients/{id}(id=${patient.id})}" class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-eye"></i> View
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(patients)}">
                                        <td colspan="7" class="text-center text-muted py-4">
                                            No patients found. Click "Add Patient" to register one.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
