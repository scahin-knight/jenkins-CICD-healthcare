<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>
    <div class="wrapper">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        
        <div class="main-content">
            <div th:replace="~{fragments/navbar :: navbar}"></div>
            
            <div class="content-wrapper">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0 text-gray-800">Hospital Overview</h2>
                    <a href="/patients/new" class="btn btn-primary shadow-sm">
                        <i class="bi bi-plus-lg me-1"></i> Add Patient
                    </a>
                </div>

                <!-- Stats Row -->
                <div class="row g-4 mb-4">
                    <div class="col-xl-3 col-md-6">
                        <div class="card stat-card primary h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Patients</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${totalPatients}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="bi bi-people fs-2 text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-xl-3 col-md-6">
                        <div class="card stat-card success h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Stable</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${stablePatients}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="bi bi-check-circle fs-2 text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-xl-3 col-md-6">
                        <div class="card stat-card warning h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Warning</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${warningPatients}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="bi bi-exclamation-triangle fs-2 text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-xl-3 col-md-6">
                        <div class="card stat-card danger h-100 py-2">
                            <div class="card-body">
                                <div class="row no-gutters align-items-center">
                                    <div class="col mr-2">
                                        <div class="text-xs font-weight-bold text-danger text-uppercase mb-1">Critical</div>
                                        <div class="h5 mb-0 font-weight-bold text-gray-800" th:text="${criticalPatients}">0</div>
                                    </div>
                                    <div class="col-auto">
                                        <i class="bi bi-heartbreak fs-2 text-gray-300"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <h4 class="mb-3">Live Monitoring</h4>
                
                <div th:if="${#lists.isEmpty(patients)}" class="alert alert-info shadow-sm">
                    <i class="bi bi-info-circle me-2"></i> No patients in the system. Click "Add Patient" to start monitoring.
                </div>

                <div class="patient-grid">
                    <div th:each="patient : ${patients}" class="card patient-card" th:id="'patient-card-' + ${patient.id}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="card-title mb-1" th:text="${patient.fullName}">Patient Name</h5>
                                    <p class="text-muted small mb-0">
                                        <i class="bi bi-door-open"></i> Room <span th:text="${patient.roomNumber}"></span> | 
                                        <span th:text="${patient.patientCode}"></span>
                                    </p>
                                </div>
                                <span class="badge" th:classappend="${patient.admissionStatus == 'Critical' ? 'bg-danger' : (patient.admissionStatus == 'Warning' ? 'bg-warning' : 'bg-success')}" th:text="${patient.admissionStatus}">Status</span>
                            </div>
                            
                            <!-- Vitals placeholders for WebSocket to update -->
                            <div class="vital-row">
                                <span class="vital-label"><i class="bi bi-heart-pulse text-danger"></i> Heart Rate</span>
                                <span class="vital-value" th:id="'hr-' + ${patient.id}">-- bpm</span>
                            </div>
                            <div class="vital-row">
                                <span class="vital-label"><i class="bi bi-droplet-half text-primary"></i> Blood Pressure</span>
                                <span class="vital-value" th:id="'bp-' + ${patient.id}">--/-- mmHg</span>
                            </div>
                            <div class="vital-row">
                                <span class="vital-label"><i class="bi bi-lungs text-info"></i> SpO2</span>
                                <span class="vital-value" th:id="'spo2-' + ${patient.id}">--%</span>
                            </div>
                            <div class="vital-row">
                                <span class="vital-label"><i class="bi bi-thermometer-half text-warning"></i> Temp</span>
                                <span class="vital-value" th:id="'temp-' + ${patient.id}">--°C</span>
                            </div>
                            
                            <div class="mt-3 text-center">
                                <a th:href="@{/patients/{id}(id=${patient.id})}" class="btn btn-sm btn-outline-primary w-100">View Details</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/websocket.js}"></script>
</body>
</html>
